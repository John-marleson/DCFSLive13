<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro</title>
</head>
<body>
    <!--crie um formulario de cadastro  com: nome, email, CEP, senha e confirmação de senha-->
    <h1>formulario</h1>
    <form action="#">
        <fieldset>
            <legend>Dados pessoais</legend>
            <label for="Name">Name</label>
            <input type="text" id="Name-usuario"><br>

            <label for="Email">Email</label>
            <input type="email" name="Email" id="Email"><br>

            <label for="CEP">CEP</label>
            <input type="text" placeholder="xxxxx-xx" id="CEP"><br>

            <label for="idade">idade</label>
            <input type="number" name="idade" id="idade"><br>

            <label for="DataDeNascimento">Data De Nascimento</label>
            <input type="date" name="DataDeNascimento" id="DataDeNascimento"><br>

            <label for="Horario">Hora De Nascimento</label>
            <input type="time" name="Horario" id="Horario"> <br>
        </fieldset>
        <fieldset>
            <legend>Outros Dados</legend>
            <label for="cor">cor</label>
            <input type="color" name="cor" id="cor"><br>

            <label for="Horario">Hora De Nascimento</label>
            <input type="time" name="Horario" id="Horario"> <br>
        </fieldset>
        <label for="cor">cor</label>
        <input type="color" name="cor" id="cor"><br>
    
        <label for="senha">senha</label>
        <input type="password" name="senha" id="senha"><br>

        <label for="senha">confirmar senha</label>
        <input type="password" name="senha" id="senha"><br>

        <input type="submit" value="Enviar cadastro"> <br>

        <label for="arquivo">arquivo</label>
        <input type="file"> <br>

        <label for="telefone">telefone</label>
        <input type="tel"> <br>
    </form>
    <form action="#">
        <label for="letra">Selecione a letra:</label> <br>

        <input type="radio" id="H" name="letra" value="H">
        <label for="H">H</label> <br>

        <input type="radio" id="A" name="letra" value="A">
        <label for="A">A</label> <br>

        <input type="radio" id="B" name="letra" value="B">
        <label for="B">B</label> <br>
    </form>
     <form action="#">
        <label for="unidade">escolha uma das unidades:</label> <br>

        <input type="radio" name="unidade" id="fortaleza" value="fortaleza">
        <label for="fortaleza">fortaleza</label> <br>

        <input type="radio" name="unidade" id="eusebio" value="eusebio">
        <label for="eusebio">eusebio</label> <br>

        <input type="radio" name="unidade" id="maracanau" value="maracanau">
        <label for="maracanau">maracanau</label>
     </form>
    <form action="#">
        <label for="turno">escolha um turno de interesse:</label> <br>

        <input type="checkbox" name="turno" id="manhã" value="manhã">
        <label for="manhã">manhã</label> <br>

        <input type="checkbox" name="turno" id="tarde" value="tarde">
        <label for="tarde">tarde</label> <br>

        <input type="checkbox" name="turno" id="noite" value="noite">
        <label for="noite">noite</label>
    </form>
</body>
</html>
