<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
</head>
<body>
    <p>para que o link seja aberto em outra aba, usamos o atributo "target" na tag "a" (ancora). quando o valor dele for _blank, o link vai abrir em uma nova aba</p>
    <h2>Exemplos:</h2>
    <a href="https://www.youtube.com/" target="_blank">youtube</a> <br>
    <a href="https://www.youtube.com/">youtube2</a>
</body>
</html>
