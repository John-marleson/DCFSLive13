<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
    <button id="diaEnoite">on/off</button>
    <h1>Atividade 1 - Eventos no DOM</h1>

    <p>A DIV abaixo funciona como uma lousa mágica. Ao clicar nos botões abaixo ela irá mudar de cor, de acordo com o background do botão. Ao passar o mouse em cima dela, a div irá mudar de cor para branco. </p>

    <div id="lousa" style="width: 200px; height: 200px; background-color: rgb(255, 252, 252); border: 5px solid rgb(0, 0, 0);"></div>
    <button id="vermelho" style="background-color: rgb(255, 0, 0); width: 150px; height: 50px;">Vermelho</button>
    <button id="verde" style="background-color: rgb(1, 103, 1); width: 150px; height: 50px;">Verde</button>
    <button id="azul" style="background-color: rgb(0, 0, 255); width: 150px; height: 50px;">Azul</button>

    <script src="atividade1.js"></script>
    
</body>
</html>
