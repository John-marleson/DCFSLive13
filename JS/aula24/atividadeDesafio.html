    <style>
        /* Reset básico */
        body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
        }

        /* Título principal */
        .titulo-principal {
        font-size: 32px;
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
        }

        /* Container geral dos livros */
        .container-livros {
        padding: 10px;
        background-color: #b2bec3;
        border-radius: 8px;
        border: 2px solid #596364;
        }

        /* Card do livro */
        .card-livro {
        background-color: #ffffff;
        border: 2px solid #ddd;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 15px;
        width: 200px;
        }

        /* Título do livro */
        .titulo-livro {
        font-size: 20px;
        color: #34495e;
        margin: 5px 0;
        }

        /* Autor e infos */
        .texto-livro {
        font-size: 14px;
        color: #555;
        margin: 2px 0;
        }

        /* Preço */
        .preco-livro {
        font-size: 16px;
        color: #27ae60;
        font-weight: bold;
        margin-top: 5px;
        }

        /* Livro caro (para usar via JS) */
        .livro-caro {
        background-color: #ffeaa7;
        border: 2px solid #fdcb6e;
        }

        /* Livro sem estoque */
        .sem-estoque {
        background-color: #fab1a0;
        border: 2px solid #e17055;
        }

        /* Categoria destaque */
        .categoria {
        font-size: 12px;
        color: #fff;
        background-color: #6c5ce7;
        display: inline-block;
        padding: 2px 6px;
        border-radius: 4px;
        margin-top: 5px;
        }

        /* Imagem do livro */
        .img-livro {
        width: 120px;
        height: auto;
        border-radius: 6px;
        border: 1px solid #ccc;
        display: block;
        margin-bottom: 8px;
        }

        /* Área de resumo */
        .resumo {
        background-color: #dfe6e9;
        border: 2px solid #b2bec3;
        padding: 10px;
        margin-bottom: 20px;
        font-size: 16px;
        }
    </style>
</head>

                titulo.classList = 'titulo-livro'
                livro.appendChild(titulo)

                livro.appendChild(autor)
