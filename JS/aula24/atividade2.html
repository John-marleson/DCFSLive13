<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Criação e adição de elementos filhos</h1>

    <p>Esse site mostra o valor dos produtos do Hortifruti do Cleitinho. Produtinhos frescos da fazenda do Cleitinho para sua casa</p>

    <div id="frutas">
        <ul id="frutasLista"></ul>
    </div>

    <div id="verdurasElegumes">
        <ul id="verdurasElegumesLista"> </ul>
    </div>
    <script>
         //elementos que serão manipulados no html
        const frutasLista = document.querySelector('#frutasLista')
        const verdurasElegumes = document.querySelector('#verdurasElegumesLista')

        //informações dos produtos
        const produtos = [
            { nome: "Maçã", preco: 4.50, categoria: "Frutas" },
            { nome: "Banana", preco: 3.20, categoria: "Frutas" },
            { nome: "Laranja", preco: 3.80, categoria: "Frutas" },
            { nome: "Abacaxi", preco: 5.90, categoria: "Frutas" },
            { nome: "Manga", preco: 4.00, categoria: "Frutas" },
            { nome: "Uva", preco: 6.50, categoria: "Frutas" },
            { nome: "Morango", preco: 7.00, categoria: "Frutas" },

            { nome: "Alface", preco: 2.50, categoria: "Verduras" },
            { nome: "Couve", preco: 2.80, categoria: "Verduras" },
            { nome: "Espinafre", preco: 3.00, categoria: "Verduras" },
            { nome: "Rúcula", preco: 2.70, categoria: "Verduras" },
            { nome: "Agrião", preco: 2.90, categoria: "Verduras" },
            { nome: "Repolho", preco: 3.50, categoria: "Verduras" },

            { nome: "Tomate", preco: 4.20, categoria: "Legumes" },
            { nome: "Cenoura", preco: 3.00, categoria: "Legumes" },
            { nome: "Batata", preco: 3.60, categoria: "Legumes" },
            { nome: "Cebola", preco: 2.80, categoria: "Legumes" },
            { nome: "Abobrinha", preco: 3.40, categoria: "Legumes" },
            { nome: "Berinjela", preco: 4.10, categoria: "Legumes" },
            { nome: "Pimentão", preco: 5.00, categoria: "Legumes" }
            ];

            function mostrasFrutas(item){
                if(item.categoria == 'Frutas'){
                    let add = document.createElement('p');
                    add.innerText = `${item.nome}:${item.preco}`;
                    frutasLista.appendChild(add);
                }
            }
            produtos.forEach(mostrasFrutas);
    </script>

</body>
</html>
